<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Masters - Godly Upgrades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        .pixel-font { font-family: 'Press+Start+2P', cursive; }

        .resource-node {
            transition: transform 0.1s, filter 0.1s;
            cursor: pointer;
            touch-action: manipulation;
        }

        .resource-node:active { transform: scale(0.92); filter: brightness(1.3); }

        .progress-bar-container {
            width: 100%;
            height: 24px;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #334155;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            transition: width 0.1s linear;
        }

        .inventory-slot {
            width: 50px;
            height: 50px;
            background: #1e293b;
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .inventory-slot.active {
            border-color: #f59e0b;
            background: #451a03;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.7s ease-out forwards;
            font-weight: bold;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        .shake { animation: shake 0.2s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .prestige-btn { background: linear-gradient(135deg, #7c3aed, #4f46e5); transition: all 0.3s; }
        .prestige-btn:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-2px); }

        .skip-btn {
            background: #334155;
            transition: all 0.2s;
        }
        .skip-btn:not(:disabled):hover {
            background: #475569;
            color: #ef4444;
        }
        .skip-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .rainbow-text {
            animation: rainbow 3s linear infinite;
        }
        @keyframes rainbow {
            0% { color: #ff0000; }
            20% { color: #ff8800; }
            40% { color: #ffff00; }
            60% { color: #00ff00; }
            80% { color: #0000ff; }
            100% { color: #ff00ff; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-6xl mx-auto">
        <!-- Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-slate-950 flex items-center justify-between">
                <div>
                    <p data-i18n="gold_total" class="text-xs text-slate-400 uppercase font-bold tracking-tighter">Ouro Total</p>
                    <span id="gold-display" class="text-3xl font-bold text-yellow-400">0</span>
                </div>
                <div class="text-4xl">💰</div>
            </div>
            
            <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-slate-950 flex items-center justify-between">
                <div>
                    <p data-i18n="auto_mining" class="text-xs text-slate-400 uppercase font-bold tracking-tighter">Auto-Mineração</p>
                    <span id="auto-display" class="text-xl font-bold text-blue-400">0 / seg</span>
                </div>
                <div class="text-4xl">🤖</div>
            </div>

            <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-slate-950 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-tighter"><span data-i18n="prestige">Prestígio</span> (Rank <span id="rank-display">0</span>)</p>
                    <span id="bonus-display" class="text-xl font-bold text-purple-400">x1.0 Poder</span>
                </div>
                <button onclick="showPrestigeModal()" data-i18n="rank_up" class="prestige-btn text-white px-3 py-1 rounded-lg text-xs font-bold uppercase shadow-lg">Rank Up</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-6 space-y-6">
                <div class="bg-slate-800 p-6 rounded-3xl relative flex flex-col items-center justify-center border-4 border-slate-700 min-h-[480px] shadow-2xl">
                    
                    <div class="absolute top-4 left-4 bg-slate-950 px-4 py-2 rounded-xl border border-slate-600 flex items-center gap-3">
                        <div id="equipped-icon" class="text-xl">✋</div>
                        <div>
                            <p data-i18n="equipped" class="text-[10px] text-slate-500 leading-none">EQUIPADO</p>
                            <span id="equipped-name" class="text-xs font-bold text-yellow-500 uppercase">Mãos Nuas</span>
                        </div>
                    </div>

                    <div class="absolute top-4 right-4 bg-slate-950 px-3 py-1 rounded-xl border border-yellow-900/50 flex flex-col items-center">
                        <p data-i18n="luck" class="text-[9px] text-yellow-600 font-bold">SORTE</p>
                        <span id="luck-display" class="text-xs font-bold text-yellow-400">1.0</span>
                    </div>

                    <div id="target-container" class="relative group mt-8">
                        <div id="resource-node" class="resource-node w-56 h-56 flex items-center justify-center bg-slate-700 rounded-[2.5rem] shadow-2xl border-b-8 border-slate-900">
                            <svg id="node-icon" viewBox="0 0 24 24" class="w-36 h-36 drop-shadow-lg">
                                <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/>
                            </svg>
                        </div>
                    </div>

                    <button id="skip-btn" onclick="skipItem()" class="mt-4 skip-btn px-6 py-2 rounded-full border border-slate-600 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 group">
                        <span id="skip-icon">⏭️</span>
                        <span data-i18n="skip_item">Pular Item</span>
                        <span id="skip-timer" class="hidden text-red-500 ml-1">15s</span>
                    </button>

                    <div class="w-full mt-6 px-4">
                        <div class="flex justify-between mb-2 items-end">
                            <div>
                                <span id="node-type" class="font-black text-slate-200 text-lg uppercase tracking-tight">---</span>
                                <p data-i18n="resistance" class="text-[10px] text-slate-500 uppercase">RESISTÊNCIA DO ITEM</p>
                            </div>
                            <span id="health-text" class="font-mono text-sm font-bold text-blue-400">0/0</span>
                        </div>
                        <div class="progress-bar-container">
                            <div id="progress-fill" class="progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-slate-950">
                    <h2 data-i18n="toolbox" class="text-xs font-bold mb-4 text-slate-400 uppercase tracking-widest text-center">Caixa de Ferramentas</h2>
                    <div id="inventory-grid" class="flex flex-wrap gap-2 justify-center"></div>
                </div>
            </div>

            <div class="lg:col-span-6 space-y-6">
                <div class="bg-slate-800 rounded-2xl border-b-4 border-slate-950 overflow-hidden flex flex-col h-[650px]">
                    <div class="flex border-b border-slate-700">
                        <button onclick="switchTab('tools')" id="tab-tools" data-i18n="tab_equip" class="flex-1 p-4 font-bold text-xs uppercase tracking-widest bg-slate-700 text-white">Equipamentos</button>
                        <button onclick="switchTab('auto')" id="tab-auto" data-i18n="tab_auto" class="flex-1 p-4 font-bold text-xs uppercase tracking-widest hover:bg-slate-700 transition">Automação</button>
                        <button onclick="switchTab('upgrades')" id="tab-upgrades" data-i18n="tab_upgrades" class="flex-1 p-4 font-bold text-xs uppercase tracking-widest hover:bg-slate-700 transition">Upgrades</button>
                    </div>
                    
                    <div id="shop-container" class="p-4 overflow-y-auto flex-1 space-y-3"></div>
                </div>
            </div>
        </div>

        <div id="game-log" class="mt-6 text-xs text-slate-500 h-16 overflow-hidden bg-slate-950 bg-opacity-50 p-3 rounded-xl italic border border-slate-800"></div>
    </div>

    <!-- Modal de Prestígio -->
    <div id="prestige-modal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-800 max-w-md w-full rounded-3xl p-8 border-4 border-purple-600">
            <h2 data-i18n="prestige_title" class="text-2xl font-black text-center text-purple-400 mb-2 uppercase">Avanço de Rank</h2>
            <p data-i18n="prestige_desc" class="text-slate-400 text-sm text-center mb-6">Reset seu progresso para ganhar um multiplicador de poder e novas eras.</p>
            <div class="bg-slate-900 rounded-2xl p-4 mb-6 space-y-3">
                <div class="flex justify-between items-center">
                    <span data-i18n="prestige_cost" class="text-xs text-slate-400 uppercase">Custo:</span>
                    <span id="prestige-cost" class="font-bold text-yellow-500">0</span>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="closePrestigeModal()" data-i18n="cancel" class="flex-1 py-3 rounded-xl bg-slate-700 font-bold uppercase text-xs">CANCELAR</button>
                <button id="confirm-prestige-btn" onclick="executePrestige()" data-i18n="rank_up" class="flex-1 py-3 rounded-xl prestige-btn font-bold uppercase text-xs">RANK UP!</button>
            </div>
        </div>
    </div>

    <script>
        const I18N = {
            pt: {
                gold_total: "Ouro Total", auto_mining: "Auto-Mineração", prestige: "Prestígio", rank_up: "Rank Up", equipped: "Equipado", 
                luck: "Sorte", resistance: "Resistência", toolbox: "Caixa de Ferramentas", tab_equip: "Equipamentos", tab_auto: "Automação", 
                tab_upgrades: "Upgrades", prestige_title: "Avanço de Rank", prestige_desc: "Reinicia o progresso por poder permanente.",
                prestige_cost: "Custo:", cancel: "Cancelar", acquired: "Adquirido", buy: "Comprar", damage: "Dano",
                luck_upgrade_name: "Amuleto da Sorte", luck_upgrade_desc: "Aumenta chance de raros.", level: "Nível",
                msg_break: "Quebrou {0}! (+{1} Ouro)", msg_bought: "Comprou {0}!", msg_prestige: "RANK UP! Nível {0}",
                skip_item: "Pular Item", msg_skip: "Item descartado pelo scanner.",
                god_luck_name: "Sorte de 1 em 100", god_luck_desc: "Multiplica a sorte total por 100x!"
            }
        };

        const TOOLS = [
            { id: 0, name: {pt:"Mãos Nuas"}, damage: 2, icon: "✋", cost: 0, owned: true, elite: false },
            { id: 1, name: {pt:"Picareta de Madeira"}, damage: 12, icon: "⛏️", cost: 50, owned: false, elite: false },
            { id: 2, name: {pt:"Picareta de Pedra"}, damage: 35, icon: "🔨", cost: 250, owned: false, elite: false },
            { id: 3, name: {pt:"Picareta de Ferro"}, damage: 95, icon: "🔧", cost: 1000, owned: false, elite: false },
            { id: 4, name: {pt:"Picareta de Ouro"}, damage: 250, icon: "✨", cost: 3500, owned: false, elite: false },
            { id: 5, name: {pt:"Picareta de Diamante"}, damage: 650, icon: "💎", cost: 12000, owned: false, elite: false },
            { id: 6, name: {pt:"Broca de Plasma"}, damage: 1800, icon: "🔥", cost: 45000, owned: false, elite: false },
            { id: 7, name: {pt:"Lâmina Vibratória"}, damage: 6000, icon: "⚔️", cost: 200000, owned: false, elite: true, reqRank: 1 },
            { id: 8, name: {pt:"Desintegrador"}, damage: 25000, icon: "⚛️", cost: 800000, owned: false, elite: true, reqRank: 2 },
            { id: 9, name: {pt:"Fissurador Galáctico"}, damage: 100000, icon: "🌀", cost: 3500000, owned: false, elite: true, reqRank: 3 },
            { id: 10, name: {pt:"O Infinito"}, damage: 99999999999, icon: "♾️", cost: 500000000, owned: false, elite: true, reqRank: 5 }
        ];

        const AUTO_MINERS = [
            { id: 0, name: {pt:"Robô Clicker"}, dps: 5, cost: 150, owned: 0, icon: "🤖" },
            { id: 1, name: {pt:"Equipe Mineira"}, dps: 70, cost: 2000, owned: 0, icon: "👥" },
            { id: 2, name: {pt:"Drone Orbital"}, dps: 450, cost: 20000, owned: 0, icon: "🛰️" },
            { id: 3, name: {pt:"Laser Planetário"}, dps: 2500, cost: 150000, owned: 0, icon: "📡" },
            { id: 4, name: {pt:"Fábrica Estelar"}, dps: 15000, cost: 1000000, owned: 0, icon: "🏭" },
            { id: 5, name: {pt:"Buraco Negro Estável"}, dps: 1000000, cost: 100000000, owned: 0, icon: "🕳️" },
            { id: 6, name: {pt:"Desintegrador de Tudo"}, dps: 1000000000, cost: 5000000000, owned: 0, icon: "🌌", reqRank: 8 }
        ];

        const NODES = [
            { id:0, name: {pt:"Poeira Estelar"}, hp: 40, reward: 5, color: "#94a3b8", rarity: 1 },
            { id:1, name: {pt:"Rocha Comum"}, hp: 80, reward: 12, color: "#64748b", rarity: 1 },
            { id:2, name: {pt:"Minério de Ferro"}, hp: 200, reward: 35, color: "#cbd5e1", rarity: 1 },
            { id:3, name: {pt:"Cristal de Quartzo"}, hp: 450, reward: 100, color: "#f8fafc", rarity: 2 },
            { id:4, name: {pt:"Pepita de Ouro"}, hp: 1200, reward: 300, color: "#fbbf24", rarity: 2 },
            { id:5, name: {pt:"Esmeralda"}, hp: 3000, reward: 800, color: "#10b981", rarity: 3 },
            { id:6, name: {pt:"Rubi Escarlate"}, hp: 7500, reward: 2200, color: "#ef4444", rarity: 4 },
            { id:7, name: {pt:"Safira Real"}, hp: 15000, reward: 5000, color: "#3b82f6", rarity: 5 },
            { id:8, name: {pt:"Ametista Profunda"}, hp: 32000, reward: 12000, color: "#a855f7", rarity: 6 },
            { id:9, name: {pt:"Pedra Solar"}, hp: 70000, reward: 28000, color: "#f97316", rarity: 7 },
            { id:10, name: {pt:"Pedra Lunar"}, hp: 150000, reward: 65000, color: "#e2e8f0", rarity: 8 },
            { id:11, name: {pt:"Obsidiana Estelar"}, hp: 350000, reward: 150000, color: "#1e293b", rarity: 9 },
            { id:12, name: {pt:"Minério de Mithril"}, hp: 800000, reward: 400000, color: "#99f6e4", rarity: 10 },
            { id:13, name: {pt:"Cristal de Adamantino"}, hp: 2000000, reward: 1000000, color: "#fca5a5", rarity: 11 },
            { id:14, name: {pt:"Eletro-Quartzo"}, hp: 5000000, reward: 2800000, color: "#7dd3fc", rarity: 12 },
            { id:15, name: {pt:"Núcleo Vulcânico"}, hp: 12000000, reward: 7000000, color: "#dc2626", rarity: 13 },
            { id:16, name: {pt:"Lágrima de Netuno"}, hp: 30000000, reward: 18000000, color: "#1d4ed8", rarity: 14 },
            { id:17, name: {pt:"Minério de Estrela Neutrons"}, hp: 80000000, reward: 50000000, color: "#ffffff", rarity: 15 },
            { id:18, name: {pt:"Antimatéria"}, hp: 250000000, reward: 150000000, color: "#4c1d95", rarity: 16 },
            { id:19, name: {pt:"Matéria Escura"}, hp: 800000000, reward: 500000000, color: "#000000", rarity: 17 },
            { id:20, name: {pt:"Eco do Big Bang"}, hp: 2500000000, reward: 1800000000, color: "#fb923c", rarity: 18 },
            { id:21, name: {pt:"Fragmento de Tempo"}, hp: 10000000000, reward: 7500000000, color: "#60a5fa", rarity: 19 },
            { id:22, name: {pt:"Singularidade"}, hp: 50000000000, reward: 40000000000, color: "#000000", rarity: 20 },
            { id:23, name: {pt:"Imortalidade"}, hp: 1000000000000, reward: 100000000000, color: "rainbow", rarity: 50 }
        ];

        let state = {
            gold: 0, prestigeRank: 0, bonusMult: 1.0, luck: 1.0, luckLevel: 0, godLuckOwned: false, lang: 'pt',
            activeToolIdx: 0, currentNodeIdx: 0, currentHP: 40, currentTab: 'tools', skipCooldown: false
        };

        function init() {
            setLanguage('pt');
            startAutoMiners();
            spawnNextNode();
            refreshAll();
        }

        function setLanguage(l) {
            state.lang = l;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = I18N[l][key] || key;
            });
            refreshAll();
        }

        document.getElementById('resource-node').addEventListener('mousedown', (e) => {
            const tool = TOOLS[state.activeToolIdx];
            applyDamage(tool.damage * state.bonusMult, e.clientX, e.clientY);
            document.getElementById('resource-node').classList.add('shake');
            setTimeout(() => document.getElementById('resource-node').classList.remove('shake'), 100);
        });

        function skipItem() {
            if (state.skipCooldown) return;
            addLog(I18N[state.lang].msg_skip);
            spawnNextNode();
            refreshAll();
            state.skipCooldown = true;
            const btn = document.getElementById('skip-btn');
            const timerEl = document.getElementById('skip-timer');
            const icon = document.getElementById('skip-icon');
            btn.disabled = true;
            timerEl.classList.remove('hidden');
            icon.innerText = "⏳";
            let timeLeft = 15;
            const interval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = `${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    state.skipCooldown = false;
                    btn.disabled = false;
                    timerEl.classList.add('hidden');
                    icon.innerText = "⏭️";
                }
            }, 1000);
        }

        function spawnNextNode() {
            const currentLuck = state.godLuckOwned ? (state.luck * 100) : state.luck;
            const luckBonus = Math.floor(currentLuck / 2);
            // Máximo de raridade aumenta com rank e sorte
            const maxRarity = Math.min(100, (state.prestigeRank * 2) + 1 + luckBonus);
            const possibleNodes = NODES.filter(n => n.rarity <= maxRarity);
            const roll = Math.floor(Math.random() * possibleNodes.length);
            state.currentNodeIdx = NODES.findIndex(n => n.id === possibleNodes[roll].id);
            state.currentHP = NODES[state.currentNodeIdx].hp;
        }

        function applyDamage(amount, x = null, y = null) {
            state.currentHP -= amount;
            if (x && y) createFloatingText(x, y, `-${formatNumber(amount)}`, 'text-yellow-400');
            if (state.currentHP <= 0) {
                const node = NODES[state.currentNodeIdx];
                const reward = node.reward * state.bonusMult;
                state.gold += reward;
                addLog(I18N[state.lang].msg_break.replace("{0}", node.name[state.lang]).replace("{1}", formatNumber(reward)));
                spawnNextNode();
            }
            updateUI();
        }

        function startAutoMiners() {
            setInterval(() => {
                let dps = 0;
                AUTO_MINERS.forEach(m => dps += m.dps * m.owned);
                if (dps > 0) applyDamage(dps * state.bonusMult / 10);
                document.getElementById('auto-display').innerText = formatNumber(dps * state.bonusMult) + " / seg";
                document.getElementById('gold-display').innerText = formatNumber(state.gold);
            }, 100);
        }

        function switchTab(t) {
            state.currentTab = t;
            ['tools', 'auto', 'upgrades'].forEach(id => document.getElementById(`tab-${id}`).classList.remove('bg-slate-700', 'text-white'));
            document.getElementById(`tab-${t}`).classList.add('bg-slate-700', 'text-white');
            renderShop();
        }

        function renderShop() {
            const container = document.getElementById('shop-container');
            container.innerHTML = '';
            if (state.currentTab === 'tools') {
                TOOLS.forEach((tool, i) => {
                    if (i === 0 || (tool.elite && state.prestigeRank < tool.reqRank && !tool.owned)) return;
                    container.innerHTML += `
                        <div class="p-3 rounded-xl border-2 ${tool.owned ? 'bg-slate-900 border-green-900 opacity-60' : 'bg-slate-800 border-slate-700'} flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl">${tool.icon}</span>
                                <div><h4 class="font-bold text-xs ${tool.elite ? 'text-purple-400' : ''}">${tool.name[state.lang]}</h4><p class="text-[9px] text-slate-500">${I18N[state.lang].damage}: ${formatNumber(tool.damage)}</p></div>
                            </div>
                            ${tool.owned ? `<span class="text-[9px] text-green-500 font-bold">${I18N[state.lang].acquired}</span>` : `<button onclick="buyTool(${i})" class="bg-blue-600 px-3 py-1 rounded-lg text-[10px] font-bold">${formatNumber(tool.cost)}</button>`}
                        </div>`;
                });
            } else if (state.currentTab === 'auto') {
                AUTO_MINERS.forEach((m, i) => {
                    if (m.reqRank && state.prestigeRank < m.reqRank) return;
                    const cost = Math.floor(m.cost * Math.pow(1.3, m.owned));
                    container.innerHTML += `<div class="p-3 rounded-xl border-2 border-slate-700 bg-slate-800 flex justify-between items-center"><div class="flex items-center gap-3"><span class="text-2xl">${m.icon}</span><div><h4 class="font-bold text-xs">${m.name[state.lang]}</h4><p class="text-[9px] text-slate-500">DPS: +${formatNumber(m.dps)} | Qtd: ${m.owned}</p></div></div><button onclick="buyAuto(${i})" class="bg-green-700 px-3 py-1 rounded-lg text-[10px] font-bold">${formatNumber(cost)}</button></div>`;
                });
            } else {
                // Sorte Comum
                const luckCost = Math.floor(500 * Math.pow(2.5, state.luckLevel));
                container.innerHTML += `<div class="p-4 rounded-xl border-2 border-yellow-800 bg-slate-800 flex justify-between items-center mb-3"><div class="flex items-center gap-4"><span class="text-3xl">🍀</span><div><h4 class="font-bold text-sm text-yellow-500">${I18N[state.lang].luck_upgrade_name}</h4><p class="text-[10px] text-slate-400">${I18N[state.lang].luck_upgrade_desc}</p><p class="text-[10px] text-yellow-600 font-bold">${I18N[state.lang].level}: ${state.luckLevel}</p></div></div><button onclick="buyLuck()" class="bg-yellow-600 px-4 py-2 rounded-lg text-xs font-bold">${formatNumber(luckCost)}</button></div>`;
                
                // Super Sorte 1 em 100
                const godLuckCost = 1000000000; // 1 Bilhão
                container.innerHTML += `<div class="p-4 rounded-xl border-2 border-purple-800 bg-slate-900 flex justify-between items-center ${state.godLuckOwned ? 'opacity-50' : ''}"><div class="flex items-center gap-4"><span class="text-3xl">✨</span><div><h4 class="font-bold text-sm text-purple-400">${I18N[state.lang].god_luck_name}</h4><p class="text-[10px] text-slate-400">${I18N[state.lang].god_luck_desc}</p></div></div>${state.godLuckOwned ? `<span class="text-xs text-purple-500 font-bold">ATIVADO</span>` : `<button onclick="buyGodLuck()" class="bg-purple-600 px-4 py-2 rounded-lg text-xs font-bold">${formatNumber(godLuckCost)}</button>`}</div>`;
            }
        }

        function buyTool(idx) {
            if (state.gold >= TOOLS[idx].cost) { state.gold -= TOOLS[idx].cost; TOOLS[idx].owned = true; state.activeToolIdx = idx; refreshAll(); }
        }

        function buyAuto(idx) {
            const cost = Math.floor(AUTO_MINERS[idx].cost * Math.pow(1.3, AUTO_MINERS[idx].owned));
            if (state.gold >= cost) { state.gold -= cost; AUTO_MINERS[idx].owned++; refreshAll(); }
        }

        function buyLuck() {
            const cost = Math.floor(500 * Math.pow(2.5, state.luckLevel));
            if (state.gold >= cost) { state.gold -= cost; state.luckLevel++; state.luck += 0.5; refreshAll(); }
        }

        function buyGodLuck() {
            const cost = 1000000000;
            if (!state.godLuckOwned && state.gold >= cost) { state.gold -= cost; state.godLuckOwned = true; refreshAll(); }
        }

        function showPrestigeModal() {
            const cost = 10000 * Math.pow(10, state.prestigeRank);
            document.getElementById('prestige-cost').innerText = formatNumber(cost);
            document.getElementById('confirm-prestige-btn').disabled = state.gold < cost;
            document.getElementById('prestige-modal').classList.remove('hidden');
        }

        function closePrestigeModal() { document.getElementById('prestige-modal').classList.add('hidden'); }

        function executePrestige() {
            const cost = 10000 * Math.pow(10, state.prestigeRank);
            if (state.gold < cost) return;
            state.gold = 0; state.prestigeRank++; state.bonusMult = (state.prestigeRank + 1) * 2;
            TOOLS.forEach((t, i) => { if (i !== 0 && !t.elite) t.owned = false; });
            AUTO_MINERS.forEach(m => m.owned = 0);
            state.activeToolIdx = 0;
            closePrestigeModal(); spawnNextNode(); refreshAll();
        }

        function refreshAll() {
            document.getElementById('gold-display').innerText = formatNumber(state.gold);
            document.getElementById('rank-display').innerText = state.prestigeRank;
            document.getElementById('bonus-display').innerText = "x" + state.bonusMult.toFixed(1);
            const displayLuck = state.godLuckOwned ? (state.luck * 100) : state.luck;
            document.getElementById('luck-display').innerText = displayLuck.toFixed(1);
            const tool = TOOLS[state.activeToolIdx];
            document.getElementById('equipped-name').innerText = tool.name[state.lang];
            document.getElementById('equipped-icon').innerText = tool.icon;
            renderInventory(); renderShop(); updateUI();
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid'); grid.innerHTML = '';
            TOOLS.forEach((t, i) => { if (t.owned) {
                const slot = document.createElement('div');
                slot.className = `inventory-slot ${state.activeToolIdx === i ? 'active' : ''}`;
                slot.innerHTML = `<span class="text-xl">${t.icon}</span>`;
                slot.onclick = () => { state.activeToolIdx = i; refreshAll(); };
                grid.appendChild(slot);
            }});
        }

        function updateUI() {
            const node = NODES[state.currentNodeIdx];
            if(!node) return;
            const percent = (state.currentHP / node.hp) * 100;
            document.getElementById('progress-fill').style.width = `${Math.max(0, percent)}%`;
            document.getElementById('health-text').innerText = `${formatNumber(state.currentHP)} / ${formatNumber(node.hp)}`;
            document.getElementById('node-type').innerText = node.name[state.lang];
            
            const nodeEl = document.getElementById('node-icon');
            const typeEl = document.getElementById('node-type');
            
            if(node.color === 'rainbow') {
                nodeEl.style.fill = 'white';
                typeEl.className = "font-black text-lg uppercase tracking-tight rainbow-text";
                document.getElementById('resource-node').style.borderColor = 'white';
            } else {
                nodeEl.style.fill = node.color;
                typeEl.className = "font-black text-slate-200 text-lg uppercase tracking-tight";
                document.getElementById('resource-node').style.borderColor = node.color;
            }
        }

        function formatNumber(num) {
            if (num >= 1e24) return (num / 1e24).toFixed(1) + "Y";
            if (num >= 1e21) return (num / 1e21).toFixed(1) + "Z";
            if (num >= 1e18) return (num / 1e18).toFixed(1) + "E";
            if (num >= 1e15) return (num / 1e15).toFixed(1) + "Q";
            if (num >= 1e12) return (num / 1e12).toFixed(1) + "T";
            if (num >= 1e9) return (num / 1e9).toFixed(1) + "B";
            if (num >= 1e6) return (num / 1e6).toFixed(1) + "M";
            if (num >= 1e3) return (num / 1e3).toFixed(1) + "K";
            return Math.floor(num).toString();
        }

        function createFloatingText(x, y, text, colorClass) {
            const el = document.createElement('div');
            el.className = `floating-text pixel-font ${colorClass} text-[10px]`;
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            el.innerText = text; document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        function addLog(msg) {
            const log = document.getElementById('game-log');
            log.innerHTML = `<div>> ${msg}</div>` + log.innerHTML;
        }

        window.onload = init;
    </script>
</body>
</html>
